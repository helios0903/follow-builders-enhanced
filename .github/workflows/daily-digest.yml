name: AI Builders Daily Digest

on:
  schedule:
    # 22:00 UTC = 07:00 KST (Asia/Seoul, UTC+9)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install follow-builders dependencies
        run: |
          git clone https://github.com/zarazhangrui/follow-builders.git /tmp/follow-builders
          cd /tmp/follow-builders/scripts && npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install deliver-html dependencies
        run: |
          cp scripts/deliver-html.js /tmp/deliver-html.js
          echo '{"type":"module"}' > /tmp/package.json

      - name: Write config
        run: |
          mkdir -p ~/.follow-builders
          cat > ~/.follow-builders/config.json << 'EOF'
          {
            "platform": "other",
            "language": "bilingual",
            "timezone": "Asia/Seoul",
            "frequency": "daily",
            "deliveryTime": "07:00",
            "delivery": {
              "method": "email",
              "email": "helios.chenn@gmail.com"
            },
            "onboardingComplete": true
          }
          EOF
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > ~/.follow-builders/.env

      - name: Fetch digest data
        run: |
          node /tmp/follow-builders/scripts/prepare-digest.js > /tmp/fb-data.json
          echo "Builders: $(node -e "const d=require('/tmp/fb-data.json'); console.log(d.stats?.xBuilders||0)")"
          echo "Podcasts: $(node -e "const d=require('/tmp/fb-data.json'); console.log(d.stats?.podcastEpisodes||0)")"

      - name: AI remix via Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT="$(cat prompts/remix-prompt.md)

          Here is today's data JSON:
          $(cat /tmp/fb-data.json)"

          echo "$PROMPT" | claude -p > /tmp/fb-digest.html
          echo "HTML size: $(wc -c < /tmp/fb-digest.html) bytes"

      - name: Send HTML email
        run: |
          cd /tmp
          node deliver-html.js --file /tmp/fb-digest.html
