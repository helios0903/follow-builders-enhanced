name: AI Builders Daily Digest

on:
  schedule:
    # 22:00 UTC = 07:00 KST (Asia/Seoul, UTC+9)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install follow-builders dependencies
        run: |
          git clone https://github.com/zarazhangrui/follow-builders.git /tmp/follow-builders
          cd /tmp/follow-builders/scripts && npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write config
        run: |
          mkdir -p ~/.follow-builders
          cat > ~/.follow-builders/config.json << 'EOF'
          {
            "platform": "other",
            "language": "bilingual",
            "timezone": "Asia/Seoul",
            "frequency": "daily",
            "deliveryTime": "07:00",
            "delivery": {
              "method": "email",
              "email": "helios.chenn@gmail.com"
            },
            "onboardingComplete": true
          }
          EOF
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > ~/.follow-builders/.env
          cp scripts/deliver-html.js /tmp/deliver-html.js
          echo '{"type":"module"}' > /tmp/package.json

      - name: Fetch digest data
        run: |
          node /tmp/follow-builders/scripts/prepare-digest.js > /tmp/fb-data.json
          echo "Builders: $(node -e "const d=require('/tmp/fb-data.json'); console.log(d.stats?.xBuilders||0)")"
          echo "Podcasts: $(node -e "const d=require('/tmp/fb-data.json'); console.log(d.stats?.podcastEpisodes||0)")"

      - name: AI remix via Claude API
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          node --input-type=module << 'JSEOF'
          import { readFileSync, writeFileSync } from 'fs';

          const token = process.env.CLAUDE_CODE_OAUTH_TOKEN;
          if (!token) throw new Error('CLAUDE_CODE_OAUTH_TOKEN not set');

          const prompt = readFileSync('prompts/remix-prompt.md', 'utf8');
          const data = readFileSync('/tmp/fb-data.json', 'utf8');
          const fullPrompt = `${prompt}\n\nHere is today's data JSON:\n${data}`;

          // Try with Bearer auth (OAuth token format)
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
              'anthropic-version': '2023-06-01',
              'anthropic-beta': 'claude-code-20250219'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-5',
              max_tokens: 8096,
              messages: [{ role: 'user', content: fullPrompt }]
            })
          });

          const json = await res.json();
          if (!res.ok) throw new Error(`API error ${res.status}: ${JSON.stringify(json)}`);

          const html = json.content[0].text;
          writeFileSync('/tmp/fb-digest.html', html);
          console.log(`Remix complete: ${html.length} bytes`);
          JSEOF

      - name: Send HTML email
        run: |
          cd /tmp && node deliver-html.js --file /tmp/fb-digest.html
